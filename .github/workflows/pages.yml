name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-site

      - name: Check out dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-site

      - name: Build combined site
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' main-site/ _site/
          mkdir -p _site/dev
          rsync -a --exclude='.git' --exclude='.github' dev-site/ _site/dev/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
