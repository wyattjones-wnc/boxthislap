name: Update Footy Schedule

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-footy-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'dev' || github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update cached footy schedule
        run: node scripts/update-footy-schedule.mjs

      - name: Commit updated schedule
        run: |
          if git diff --quiet -- data/footy-schedule.json; then
            echo "No footy schedule changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/footy-schedule.json
          git commit -m "Update footy schedule"
          git push
